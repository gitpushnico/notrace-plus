<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="404 - Page not found.">
  <meta name="theme-color" content="#050505">

  <link rel="icon" href="favicon/favicon-32x32.ico" sizes="32x32">
  <link rel="icon" type="image/png" href="favicon/favicon-32x32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon/apple-touch-icon-180.png" sizes="180x180">

  <title>404</title>

  <style>
    /* ================================================================
       NoTrace+ — 404 Error Page
       Self-contained styles to match the main visual identity.
    ================================================================ */

    @font-face {
      font-family: 'DM Mono';
      src: url('/fonts/DMMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Mono';
      src: url('/fonts/DMMono-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('/fonts/Unbounded-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('/fonts/Unbounded-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('/fonts/Unbounded-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('/fonts/Unbounded-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg:          #050505;
      --surface:     #0d0d0d;
      --surface2:    #141414;
      --border:      #1f1f1f;
      --border2:     #2a2a2a;
      --accent:      #b8ff57;
      --accent-dim:  rgba(184,255,87,0.07);
      --accent-glow: rgba(184,255,87,0.16);
      --text:        #efefef;
      --text-mid:    #888;
      --text-dim:    #444;
      --mono:        'DM Mono', monospace;
      --display:     'Unbounded', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── 404 Container ── */
    .error-container {
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 0.6s ease both;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .error-glitch-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .error-code {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: var(--display);
      font-weight: 900;
      font-size: 140px;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -6px;
      margin-right: -6px; /* Offset for alignment */
      text-shadow: 0 0 60px rgba(184, 255, 87, 0.2);
    }

    .radar-icon-inline {
      width: 105px;
      height: 105px;
      stroke: var(--accent);
      /* Matches the glow effect on the digits */
      filter: drop-shadow(0 0 30px rgba(184, 255, 87, 0.3));
      animation: radarScan 4s linear infinite;
    }

    .error-title {
      font-family: var(--display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      text-align: center;
    }

    .error-desc {
      color: var(--text-mid);
      font-size: 13px;
      max-width: 420px;
      margin: 0 auto 40px;
      line-height: 1.8;
      text-align: center;
    }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent);
      color: #050505;
      border: none;
      font-family: var(--display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      padding: 15px 32px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary:hover {
      background: #c9ff6a;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(184, 255, 87, 0.15);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes radarScan {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .error-code { font-size: 100px; }
      .radar-icon-inline { width: 75px; height: 75px; }
      .error-title { font-size: 18px; }
      .btn-primary { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-glitch-wrap">
      <div class="error-code">
        <span>4</span>
        <svg class="radar-icon-inline" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
          <path d="M19.07 4.93L12 12"/>
        </svg>
        <span>4</span>
      </div>
    </div>
    
    <h1 class="error-title">How did you end up here?</h1>
    <p class="error-desc">
      The page you’re looking for doesn’t exist.
    </p>

    <a href="/" class="btn-primary">
      Take me back
    </a>
  </div>

</body>
</html>
